<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Rental</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Naviation bar-->
    <nav>
      <div class="row nav__row">
        <img src="Assets/Nav.png" alt="" class="nav__img" />
        <div class="nav__links">
          <a href="#" class="nav__link">Home</a>
          <a href="#about" class="nav__link">About</a>
          <a href="#" class="nav__link">Vehicle Models</a>
          <a href="#testimonials" class="nav__link">Testimonials</a>
          <a href="#" class="nav__link">Our Team</a>
          <a href="#" class="nav__link">Contact</a>
        </div>
        <div class="nav__buttons">
          <a href="#" class="nav__link">Sign In</a>
          <button class="nav__button__register">Register</button>
        </div>
      </div>
    </nav>
    <!--Header-->
    <header id="home">
      <figure class="header__background__img">
        <img
          class="header_img"
          src="Assets/header-bg.png"
          alt="header__background__img"
        />
      </figure>
      <div class="header__container">
        <h4 class="header__title">Plan your trip now</h4>
        <h1 class="header__subtitle">Save big with our car rental</h1>
        <p class="header__paragraph">
          Rent the car of your dreams. Unbeatable prices, unlimited miles,
          flexible pick-up options and much more.
        </p>
        <div>
          <button class="header__book__ride__button">Book Ride</button>
          <button class="header__learn__more__button">Learn More</button>
        </div>
      </div>
      <figure class="header__car__img">
        <img src="Assets/header-car.png" alt="header__cat__img" />
      </figure>
    </header>
  </body>
</html>
